<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos - Esandjo Atelier de Mimos</title>
  <link rel="icon" type="image/png" href="imagens/esandjo.logo.jpg">
  <style>
    :root {
      --fundo: #f5f5f5;
      --contraste: #1A2A40;
      --dourado: #C9A646;
      --branco: #ffffff;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--fundo);
      color: var(--contraste);
      margin: 0;
      padding-top: 70px;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: var(--branco);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      z-index: 1000;
    }
    .navbar .logo {
      height: 45px;
    }

    /* Menu hamburguer refinado */
    .menu-toggle {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      margin: 0 auto;
      gap: 4px;
    }
    .menu-toggle span {
      height: 2px;
      width: 20px;
      background: var(--contraste);
      border-radius: 1px;
      transition: all 0.3s ease;
      opacity: 0.8;
    }
    .menu-toggle:hover span {
      background: var(--dourado);
      opacity: 1;
    }

    /* Menu lateral com fade */
    .nav-links {
      display: none;
      flex-direction: column;
      position: absolute;
      top: 70px;
      right: 0;
      width: 65%;
      background: var(--branco);
      text-align: center;
      padding: 10px 0;
      box-shadow: -2px 0 8px rgba(0,0,0,0.1);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .nav-links.show {
      display: flex;
      opacity: 1;
    }
    .nav-links a {
      background: var(--dourado);
      color: var(--branco);
      margin: 8px auto;
      padding: 8px 16px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
      width: 80%;
    }
    .nav-links a:hover { background: var(--contraste); }

    /* Idiomas à direita */
    .lang-selector {
      margin-left: auto;
    }
    .lang-selector button {
      background: var(--contraste);
      border: none;
      color: var(--branco);
      font-weight: bold;
      margin: 0 3px;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }
    .lang-selector button:hover {
      background: var(--dourado);
      color: var(--contraste);
    }

    header { text-align: center; padding: 20px; }
    .galeria { display: grid; grid-template-columns: 1fr; gap: 18px; padding: 20px 15px; }
    .produto { background: var(--branco); border-radius: 8px; padding: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
    .produto img { width: 100%; max-height: 300px; object-fit: contain; border-radius: 12px; margin-bottom: 10px; }
    .produto span { display: block; margin: 5px 0; }
    .produto button { background: var(--dourado); border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; color: var(--branco); }
    .produto button:hover { background: var(--contraste); }

    footer { background: var(--branco); color: var(--contraste); text-align: center; padding: 20px; box-shadow: 0 -2px 8px rgba(0,0,0,0.1); }
    footer a { color: var(--dourado); margin: 0 10px; text-decoration: none; font-weight: bold; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <img src="imagens/esandjo.logo.jpg" alt="Logo Esandjo" class="logo">
    <div class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <div class="lang-selector">
      <button onclick="setLang('pt')">PT</button>
      <button onclick="setLang('en')">EN</button>
      <button onclick="setLang('zh')">中文</button>
    </div>
    <div class="nav-links" id="nav-links">
      <a href="index.html" class="nav-link" data-key="home">Início</a>
      <a href="cestas.html" class="nav-link" data-key="cestas">Cestas & Mimos</a>
      <a href="pedidos.html" class="nav-link" data-key="pedidos">Pedidos</a>
      <a href="encomendas.html" class="nav-link" data-key="encomenda">Encomenda</a>
      <a href="catering.html" class="nav-link" data-key="catering">Catering Infantil</a>
      <a href="contactos.html" class="nav-link" data-key="contactos">Contactos</a>
    </div>
  </nav>

  <!-- Header -->
  <header>
    <h2 id="page-title">Pedidos</h2>
  </header>

  <!-- Galeria -->
  <section class="galeria">
    <div class="produto">
      <img src="imagens/cesta1.jpg" alt="Cesta Gourmet">
      <span class="item-name" data-key="gourmet">Cesta Gourmet</span>
      <span class="item-price">15.000,00 KZ</span>
      <button class="add-btn">Adicionar</button>
    </div>
    <div class="produto">
      <img src="imagens/cesta2.jpg" alt="Cesta Artesanal">
      <span class="item-name" data-key="artesanal">Cesta Artesanal</span>
      <span class="item-price">12.500,00 KZ</span>
      <button class="add-btn">Adicionar</button>
    </div>
    <div class="produto">
      <img src="imagens/cesta3.jpg" alt="Cesta Premium">
      <span class="item-name" data-key="premium">Cesta Premium</span>
      <span class="item-price">20.000,00 KZ</span>
      <button class="add-btn">Adicionar</button>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p id="contacts">📞 +244 924 015 087 | 📧 esandjoatelierdemimos@gmail.com</p>
    <p>
      <a href="https://www.instagram.com/esandjoatelierdemimos/" target="_blank" id="insta">Instagram</a> | 
      <a href="https://www.facebook.com/esandjoatelierdemimos/" target="_blank" id="fb">Facebook</a>
    </p>
    <p id="open-hours">Aberto todos os dias das 8h às 22h</p>
  </footer>

<script>
  function toggleMenu() {
    document.getElementById("nav-links").classList.toggle("show");
  }
  document.addEventListener("click", function(e){
    const nav = document.getElementById("nav-links");
    const toggle = document.querySelector(".menu-toggle");
    if(!nav.contains(e.target) && !toggle.contains(e.target)){
      nav.classList.remove("show");
    }
  });

  const translations = {
    pt:{pageTitle:"Pedidos",openHours:"Aberto todos os dias das 8h às 22h",
        navbar:{home:"Início",cestas:"Cestas & Mimos",pedidos:"Pedidos",encomenda:"Encomenda",catering:"Catering Infantil",contactos:"Contactos"},
        items:{gourmet:"Cesta Gourmet",artesanal:"Cesta Artesanal",premium:"Cesta Premium"},
        add:"Adicionar",insta:"Instagram",fb:"Facebook"},
	  en:{pageTitle:"Orders",openHours:"Open daily from 8am to 10pm",
      navbar:{home:"Home",cestas:"Baskets & Gifts",pedidos:"Orders",encomenda:"Checkout",catering:"Kids Catering",contactos:"Contacts"},
      items:{gourmet:"Gourmet Basket",artesanal:"Handmade Basket",premium:"Premium Basket"},
      add:"Add",insta:"Instagram",fb:"Facebook"},

  zh:{pageTitle:"订单",openHours:"每天营业，早上8点到晚上10点",
      navbar:{home:"首页",cestas:"礼篮与礼品",pedidos:"订单",encomenda:"结账",catering:"儿童餐饮",contactos:"联系方式"},
      items:{gourmet:"美食篮",artesanal:"手工篮",premium:"高级篮"},
      add:"添加",insta:"Instagram",fb:"Facebook"}
};

function setLang(lang) {
  localStorage.setItem("siteLang", lang);
  applyLang(lang);
}

function applyLang(lang) {
  // Título da página
  document.getElementById('page-title').textContent = translations[lang].pageTitle;

  // Horário de funcionamento
  document.getElementById('open-hours').textContent = translations[lang].openHours;

  // Navbar
  document.querySelectorAll('.nav-link').forEach(link => {
    const key = link.getAttribute("data-key");
    link.textContent = translations[lang].navbar[key];
  });

  // Itens da galeria
  document.querySelectorAll('.item-name').forEach(span => {
    const key = span.getAttribute("data-key");
    span.textContent = translations[lang].items[key];
  });

  // Botões "Adicionar"
  document.querySelectorAll('.add-btn').forEach(btn => {
    btn.textContent = translations[lang].add;
  });

  // Footer links
  document.getElementById('insta').textContent = translations[lang].insta;
  document.getElementById('fb').textContent = translations[lang].fb;
}

window.onload = function() {
  const lang = localStorage.getItem("siteLang") || "pt";
  applyLang(lang);
};
</script>
</body>
</html>
