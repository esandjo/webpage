<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos - Esandjo Atelier de Mimos</title>
  <link rel="icon" type="image/png" href="imagens/esandjo.logo.jpg">
  <style>
:root {
  --fundo: #f5f5f5;          /* fundo claro inspirado no mármore */
  --contraste: #1A2A40;      /* texto escuro para contraste */
  --dourado: #C9A646;        /* dourado elegante do logo */
  --branco: #ffffff;
}

body {
  font-family: 'Montserrat', sans-serif;
  background: var(--fundo);
  color: var(--contraste);
  margin: 0;
  padding: 0;
  padding-top: 80px; /* reserva espaço para a navbar fixa */
}

/* Navbar fixa premium */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  background: var(--branco);
  padding: 10px;
  z-index: 1000;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.navbar a {
  background: var(--dourado);
  color: var(--branco);
  font-weight: 600;
  text-decoration: none;
  margin: 5px 8px;
  padding: 8px 16px;
  border-radius: 20px;
  transition: all 0.3s ease;
}
.navbar a:hover {
  background: var(--contraste);
  color: var(--branco);
}

/* Idiomas */
.lang-selector {
  margin-left: 20px;
}
.lang-selector button {
  background: var(--contraste);
  border: none;
  color: var(--branco);
  font-weight: bold;
  margin: 0 3px;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
}
.lang-selector button:hover {
  background: var(--dourado);
  color: var(--contraste);
}

/* Header */
header {
  text-align: center;
  padding: 40px 20px 20px;
  background: var(--fundo);
}
.logo-header {
  height: 70px;
  margin-bottom: 10px;
}

/* Ajuste específico para mobile: move o logo 2cm para baixo */
@media (max-width: 600px) {
  .logo-header {
    margin-top: 2cm;
  }
}

/* Botão CTA */
.cta {
  display: block;
  margin: 0 auto;
  background: var(--dourado);
  color: var(--branco);
  padding: 10px 22px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  transition: background 0.3s ease;
  max-width: 190px;
}
.cta:hover {
  background: var(--contraste);
  color: var(--branco);
}

/* Galeria */
.galeria {
  display: grid;
  grid-template-columns: 1fr;
  gap: 18px;
  padding: 20px 15px;
}
.galeria img {
  width: 100%;
  height: auto;
  max-height: 300px;
  object-fit: cover;
  background-color: var(--fundo);
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  cursor: pointer;
  transition: transform 0.3s ease;
}
.galeria img:hover { transform: scale(1.05); }

/* Carrinho Premium */
.cart { padding:20px; max-width:900px; margin:auto; }
.cart-table {
  width:100%;
  border-collapse: collapse;
  margin-top: 20px;
  box-shadow: 0 6px 25px rgba(0,0,0,0.15);
  border-radius: 12px;
  overflow: hidden;
  font-size: 0.95em;
}
.cart-table th {
  background: linear-gradient(135deg, var(--contraste), #2a3b55);
  color: var(--dourado);
  font-weight: bold;
  padding: 14px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.cart-table td {
  background: var(--branco);
  color: var(--contraste);
  padding: 12px;
  text-align: center;
  border-bottom: 1px solid var(--dourado);
}
.cart-table tr:hover td { background: #f0f0f0; transition: 0.3s; }

/* Botões do carrinho */
.cart-table button {
  background: var(--dourado);
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  color: var(--branco);
  margin: 0 4px;
  transition: 0.3s;
}
.cart-table button:hover { background: var(--contraste); }
.cart-table button.remove {
  background: #e74c3c;
  color: #fff;
}
.cart-table button.remove:hover { background: #c0392b; }

/* Linha do total geral */
.total-row td {
  font-weight: bold;
  background: #eaeaea;
  color: var(--contraste);
  text-align: right;
  font-size: 1.1em;
  padding: 14px;
}

/* Botão finalizar no WhatsApp */
.finalizar {
  display:block;
  margin:20px auto;
  background:#25D366;
  color:#fff;
  padding:10px 22px;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
  text-align:center;
  max-width:250px;
}
.finalizar:hover { background:#1ebe57; }

/* Lightbox */
.lightbox {
  display: none;
  position: fixed;
  z-index: 2000;
  left: 0; top: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
#lightbox-content {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
}
#lightbox-content img,
#lightbox-content video {
  max-width: 90%;
  max-height: 80%;
  border-radius: 12px;
}
.close, .prev, .next {
  position: absolute;
  color: var(--contraste);
  font-size: 40px;
  cursor: pointer;
  padding: 10px;
}
.close { top: 20px; right: 30px; }
.prev { left: 30px; top: 50%; transform: translateY(-50%); }
.next { right: 30px; top: 50%; transform: translateY(-50%); }

/* Footer */
footer {
  background: var(--branco);
  color: var(--contraste);
  text-align:center;
  padding:20px;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
}
footer a {
  color: var(--dourado);
  margin:0 10px;
  text-decoration:none;
}
footer a:hover { text-decoration:underline; }

/* Responsividade */
@media (min-width: 600px) {
  .galeria { grid-template-columns: repeat(2, 1fr); }
}
@media (min-width: 900px) {
  .galeria { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 768px) {
  .navbar { flex-direction: column; padding: 12px; }
  .navbar a { margin: 6px 0; display: block; }
  .lang-selector { margin-top: 10px; }
  .cta { width: 100%; max-width: none; }
}





  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="nav-link" data-key="home">Início</a>
    <a href="cestas.html" class="nav-link" data-key="cestas">Cestas & Mimos</a>
    <a href="pedidos.html" class="nav-link" data-key="pedidos">Pedidos</a>
    <a href="encomendas.html" class="nav-link" data-key="encomenda">Encomenda</a>
    <a href="catering.html" class="nav-link" data-key="catering">Catering Infantil</a>
    <a href="contactos.html" class="nav-link" data-key="contactos">Contactos</a>
    <div class="lang-selector">
      <button onclick="setLang('pt')">PT</button>
      <button onclick="setLang('en')">EN</button>
      <button onclick="setLang('zh')">中文</button>
    </div>
  </nav>

  <!-- Header -->
  <header>
    <a href="index.html">
      <img src="imagens/esandjo.logo.jpg" alt="Esandjo Atelier de Mimos" class="logo-header">
    </a>
  </header>

  <!-- Galeria -->
  <section class="galeria">
    <div class="produto">
      <img src="imagens/cesta1.jpg" alt="Cesta Gourmet">
      <span class="item-name" data-key="gourmet">Cesta Gourmet</span>
      <span>15.000,00 KZ</span>
      <button class="add-btn" onclick="addToCart('Cesta Gourmet',15000); showSuggestion('gourmet')">Adicionar</button>
    </div>
    <div class="produto">
      <img src="imagens/cesta2.jpg" alt="Cesta Artesanal">
      <span class="item-name" data-key="artesanal">Cesta Artesanal</span>
      <span>12.500,00 KZ</span>
      <button class="add-btn" onclick="addToCart('Cesta Artesanal',12500); showSuggestion('artesanal')">Adicionar</button>
    </div>
    <div class="produto">
      <img src="imagens/cesta3.jpg" alt="Cesta Premium">
      <span class="item-name" data-key="premium">Cesta Premium</span>
      <span>20.000,00 KZ</span>
      <button class="add-btn" onclick="addToCart('Cesta Premium',20000); showSuggestion('premium')">Adicionar</button>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>📞 +244 924 015 087 | 📧 esandjoatelierdemimos@gmail.com</p>
    <p>
      <a href="https://www.instagram.com/esandjoatelierdemimos/" target="_blank">Instagram</a> | 
      <a href="https://www.facebook.com/esandjoatelierdemimos/" target="_blank">Facebook</a>
    </p>
    <p id="open-hours">Aberto todos os dias das 8h às 22h</p>
  </footer>

  <script>
    // Traduções completas
    const translations = {
      pt: { 
        openHours: "Aberto todos os dias das 8h às 22h",
        add: "Adicionar",
        remove: "Remover",
        items: { gourmet: "Cesta Gourmet", artesanal: "Cesta Artesanal", premium: "Cesta Premium" },
        navbar: { home:"Início", cestas:"Cestas & Mimos", pedidos:"Pedidos", encomenda:"Encomenda", catering:"Catering Infantil", contactos:"Contactos" },
        suggestion: item => `Talvez também goste de ${item} especial!`
      },
      en: { 
        openHours: "Open daily from 8am to 10pm",
        add: "Add",
        remove: "Remove",
        items: { gourmet: "Gourmet Basket", artesanal: "Handmade Basket", premium: "Premium Basket" },
        navbar: { home:"Home", cestas:"Baskets & Gifts", pedidos:"Orders", encomenda:"Checkout", catering:"Kids Catering", contactos:"Contacts" },
        suggestion: item => `You might also like special ${item}!`
      },
      zh: { 
        openHours: "每天营业，早上8点到晚上10点",
        add: "添加",
        remove: "删除",
        items: { gourmet: "美食篮", artesanal: "手工篮", premium: "高级篮" },
        navbar: { home:"首页", cestas:"礼篮与礼品", pedidos:"订单", encomenda:"结账", catering:"儿童餐饮", contactos:"联系方式" },
        suggestion: item => `您可能也会喜欢特别的 ${item}！`
      }
    };

    function setLang(lang) {
      localStorage.setItem("siteLang", lang);
      applyLang(lang);
    }

       function applyLang(lang) {
      document.getElementById('open-hours').textContent = translations[lang].openHours;

      // Atualiza botões "Adicionar"
      document.querySelectorAll('.add-btn').forEach(btn => {
        btn.textContent = translations[lang].add;
      });

      // Atualiza nomes dos itens da galeria
      document.querySelectorAll('.item-name').forEach(span => {
        const key = span.getAttribute("data-key");
        span.textContent = translations[lang].items[key];
      });

      // Atualiza navbar
      document.querySelectorAll('.nav-link').forEach(link => {
        const key = link.getAttribute("data-key");
        link.textContent = translations[lang].navbar[key];
      });
    }

    window.onload = function() {
      const lang = localStorage.getItem("siteLang") || "pt";
      applyLang(lang);
    };

    // Adicionar ao carrinho
    function addToCart(name, price) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      const item = cart.find(i => i.name === name);
      if (item) { item.qty++; } else { cart.push({name, price, qty:1}); }
      localStorage.setItem("cart", JSON.stringify(cart));
    }

    // Sugestão instantânea
    function showSuggestion(itemKey) {
      const lang = localStorage.getItem("siteLang") || "pt";
      const itemName = translations[lang].items[itemKey];
      const message = translations[lang].suggestion(itemName);

      const toast = document.createElement("div");
      toast.textContent = message;
      toast.style.position = "fixed";
      toast.style.bottom = "20px";
      toast.style.left = "50%";
      toast.style.transform = "translateX(-50%)";
      toast.style.background = "#C9A646";
      toast.style.color = "#1A2A40";
      toast.style.padding = "10px 20px";
      toast.style.borderRadius = "8px";
      toast.style.zIndex = "2000";
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }
  </script>
</body>
</html>
