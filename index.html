<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esandjo Atelier de Mimos</title>
  <style>
    :root {
      --fundo: #1A2A40;
      --contraste: #FFFFFF;
      --dourado: #C9A646;
    }
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: var(--fundo);
      color: var(--contraste);
    }

    /* Navbar fixa */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--fundo);
      padding: 10px;
      z-index: 1000;
    }
    .navbar a {
      color: var(--contraste);
      font-weight: 600;
      text-decoration: none;
      margin: 0 12px;
      transition: color 0.3s ease;
    }
    .navbar a:hover { color: var(--dourado); }

    /* Botões de idioma dentro da navbar */
    .lang-selector {
      margin-left: 20px;
    }
    .lang-selector button {
      background: var(--dourado);
      border: none;
      color: var(--fundo);
      font-weight: bold;
      margin: 0 3px;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
    }
    .lang-selector button:hover {
      background: var(--contraste);
      color: var(--fundo);
    }

    /* Header ajustado */
    header {
      text-align: center;
      padding: 30px 20px 15px; /* reduzido ~1cm */
      background: var(--fundo);
      margin-top: 60px; /* compensa navbar fixa */
    }
    .logo-header {
      height: 70px; /* reduzido */
      margin-bottom: 8px;
    }
    .cta {
      display: block;
      margin: 0 auto;
      background: var(--dourado);
      color: var(--fundo);
      padding: 10px 22px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s ease;
      max-width: 190px;
    }
    .cta:hover {
      background: var(--contraste);
      color: var(--fundo);
    }

    /* Galeria ajustada para cima */
    .galeria {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      padding: 20px 15px; /* reduzido */
    }
    .galeria img {
      width: 100%;
      height: 230px;
      object-fit: contain;
      background-color: var(--fundo);
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .galeria img:hover { transform: scale(1.05); }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 70%;
      border-radius: 12px;
    }
    .close, .prev, .next {
      position: absolute;
      color: var(--contraste);
      font-size: 40px;
      cursor: pointer;
      padding: 10px;
    }
    .close { top: 20px; right: 30px; }
    .prev { left: 30px; top: 50%; transform: translateY(-50%); }
    .next { right: 30px; top: 50%; transform: translateY(-50%); }

    /* Footer */
    footer {
      background: var(--fundo);
      color: var(--contraste);
      text-align: center;
      padding: 20px 15px;
    }
    footer a {
      color: var(--dourado);
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Navbar com idiomas -->
  <nav class="navbar">
    <a href="index.html">Início</a>
    <a href="cestas.html">Cestas & Mimos</a>
    <a href="encomendas.html">Encomendas</a>
    <a href="catering.html">Catering Infantil</a>
    <a href="contactos.html">Contactos</a>
    <div class="lang-selector">
      <button onclick="setLang('pt')">PT</button>
      <button onclick="setLang('en')">EN</button>
      <button onclick="setLang('zh')">中文</button>
    </div>
  </nav>

  <!-- Header -->
  <header>
    <a href="index.html">
      <img src="imagens/esandjo.logo.jpg" alt="Esandjo Atelier de Mimos" class="logo-header">
    </a>
    <a href="https://wa.me/244924015087" target="_blank" class="cta" id="cta-btn">Fale Conosco</a>
  </header>

  <!-- Galeria -->
  <section class="galeria">
    <img src="imagens/cesta1.jpg" alt="Cesta gourmet" onclick="openLightbox('cesta1',0)">
    <img src="imagens/cesta2.jpg" alt="Cesta artesanal" onclick="openLightbox('cesta2',0)">
    <img src="imagens/cesta3.jpg" alt="Cesta premium" onclick="openLightbox('cesta3',0)">
    <img src="imagens/cesta4.jpg" alt="Cesta temática" onclick="openLightbox('cesta4',0)">
    <img src="imagens/cesta5.jpg" alt="Cesta de luxo" onclick="openLightbox('cesta5',0)">
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <span class="prev" onclick="changeImage(-1)">&#10094;</span>
    <img id="lightbox-img" src="" alt="">
    <span class="next" onclick="changeImage(1)">&#10095;</span>
  </div>

  <!-- Footer -->
  <footer>
    <p>📞 +244 924 015 087 | 📧 esandjoatelierdemimos@gmail.com</p>
    <p>
      <a href="https://www.instagram.com/esandjoatelierdemimos/" target="_blank">Instagram</a> | 
      <a href="https://www.facebook.com/esandjoatelierdemimos/" target="_blank">Facebook</a>
    </p>
    <p id="open-hours">Aberto todos os dias das 8h às 22h</p>
  </footer>

  <script>
    const gallerySets = {
  cesta1: [
    "imagens/cesta1.jpg",
    "imagens/cesta1a.jpg",
    "imagens/cesta1b.jpg",
    "imagens/cesta1c.jpg",
    "imagens/cesta1d.jpg"
  ],
  cesta2: [
    "imagens/cesta2.jpg",
    "imagens/cesta2a.jpg",
    "imagens/cesta2b.jpg",
    "imagens/cesta2c.jpg",
    "imagens/cesta2d.jpg"
  ],
  cesta3: [
    "imagens/cesta3.jpg"
  ],
  cesta4: [
    "imagens/cesta4.jpg"
  ],
  cesta5: [
    "imagens/cesta5.jpg"
  ]
};

    let currentSet = [];
    let currentIndex = 0;

    function openLightbox(setName, index) {
      currentSet = gallerySets[setName];
      currentIndex = index;
      document.getElementById('lightbox').style.display = 'flex';
      document.getElementById('lightbox-img').src = currentSet[currentIndex];
    }

    function closeLightbox() {
      document.getElementById('lightbox').style.display = 'none';
    }

    function changeImage(direction) {
      currentIndex += direction;
      if (currentIndex < 0) currentIndex = currentSet.length - 1;
      if (currentIndex >= currentSet.length) currentIndex = 0;
      document.getElementById('lightbox-img').src = currentSet[currentIndex];
    }

    // Fechar e navegar com teclado
    document.addEventListener('keydown', function(e) {
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowLeft") changeImage(-1);
      if (e.key === "ArrowRight") changeImage(1);
    });

    // Fechar ao clicar fora (mobile)
    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target.id === 'lightbox') closeLightbox();
    });

    // Traduções
    const translations = {
      pt: { contact: "Fale Conosco", openHours: "Aberto todos os dias das 8h às 22h" },
      en: { contact: "Contact Us", openHours: "Open daily from 8am to 10pm" },
      zh: { contact: "联系我们", openHours: "每天营业，早上8点到晚上10点" }
    };

    function setLang(lang) {
      document.getElementById('cta-btn').textContent = translations[lang].contact;
      document.getElementById('open-hours').textContent = translations[lang].openHours;
    }
  </script>
</body>
</html>
