<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esandjo Atelier de Mimos</title>
  <link rel="icon" type="image/png" href="imagens/esandjo.logo.jpg">
  <style>
:root {
  --fundo: #f5f5f5;          /* fundo claro inspirado no mármore */
  --contraste: #1A2A40;      /* texto escuro para contraste */
  --dourado: #C9A646;        /* dourado elegante do logo */
  --branco: #ffffff;
}

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background-color: var(--fundo);
  color: var(--contraste);
  padding-top: 80px; /* reserva espaço para a navbar fixa */
}

/* Navbar fixa */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  background: var(--branco);
  padding: 10px;
  z-index: 1000;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* Links da navbar como botões */
.navbar a {
  background: var(--dourado);
  color: var(--branco);
  font-weight: 600;
  text-decoration: none;
  margin: 5px 8px;
  padding: 8px 16px;
  border-radius: 20px;
  transition: all 0.3s ease;
}
.navbar a:hover {
  background: var(--contraste);
  color: var(--branco);
}

/* Idiomas */
.lang-selector {
  margin-left: 20px;
}
.lang-selector button {
  background: var(--contraste);
  border: none;
  color: var(--branco);
  font-weight: bold;
  margin: 0 3px;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
}
.lang-selector button:hover {
  background: var(--dourado);
  color: var(--contraste);
}

/* Header */
header {
  text-align: center;
  padding: 40px 20px 20px;
  background: var(--fundo);
}
.logo-header {
  height: 70px;
  margin-bottom: 10px;
}

/* Ajuste específico para mobile: move o logo 2cm para baixo */
@media (max-width: 600px) {
  .logo-header {
    margin-top: 2cm;
  }
}

/* Botão CTA */
.cta {
  display: block;
  margin: 0 auto;
  background: var(--dourado);
  color: var(--branco);
  padding: 10px 22px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  transition: background 0.3s ease;
  max-width: 190px;
}
.cta:hover {
  background: var(--contraste);
  color: var(--branco);
}

/* Galeria */
.galeria {
  display: grid;
  grid-template-columns: 1fr;
  gap: 18px;
  padding: 20px 15px;
}
.galeria img {
  width: 100%;
  height: auto;
  max-height: 300px;
  object-fit: cover;
  background-color: var(--fundo);
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  cursor: pointer;
  transition: transform 0.3s ease;
}
.galeria img:hover { transform: scale(1.05); }

/* Lightbox */
.lightbox {
  display: none;
  position: fixed;
  z-index: 2000;
  left: 0; top: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
#lightbox-content {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
}
#lightbox-content img,
#lightbox-content video {
  max-width: 90%;
  max-height: 80%;
  border-radius: 12px;
}
.close, .prev, .next {
  position: absolute;
  color: var(--contraste);
  font-size: 40px;
  cursor: pointer;
  padding: 10px;
}
.close { top: 20px; right: 30px; }
.prev { left: 30px; top: 50%; transform: translateY(-50%); }
.next { right: 30px; top: 50%; transform: translateY(-50%); }

/* Footer */
footer {
  background: var(--branco);
  color: var(--contraste);
  text-align: center;
  padding: 20px 15px;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
}
footer a {
  color: var(--dourado);
  text-decoration: none;
  margin: 0 10px;
  font-weight: bold;
}
footer a:hover { text-decoration: underline; }

/* Responsividade */
@media (min-width: 600px) {
  .galeria { grid-template-columns: repeat(2, 1fr); }
}
@media (min-width: 900px) {
  .galeria { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 768px) {
  .navbar { flex-direction: column; padding: 12px; }
  .navbar a { margin: 6px 0; display: block; }
  .lang-selector { margin-top: 10px; }
  .cta { width: 100%; max-width: none; }
}

  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="nav-link" data-key="home">Início</a>
    <a href="cestas.html" class="nav-link" data-key="cestas">Cestas & Mimos</a>
    <a href="pedidos.html" class="nav-link" data-key="pedidos">Pedidos</a>
    <a href="encomendas.html" class="nav-link" data-key="encomenda">Encomenda</a>
    <a href="catering.html" class="nav-link" data-key="catering">Catering Infantil</a>
    <a href="contactos.html" class="nav-link" data-key="contactos">Contactos</a>
    <div class="lang-selector">
      <button onclick="setLang('pt')">PT</button>
      <button onclick="setLang('en')">EN</button>
      <button onclick="setLang('zh')">中文</button>
    </div>
  </nav>

  <!-- Header -->
  <header>
    <img src="imagens/esandjo.logo.jpg" alt="Esandjo Atelier de Mimos" class="logo-header">
    <a href="https://wa.me/244924015087" target="_blank" class="cta" id="cta-btn">Fale Conosco</a>
  </header>

  <!-- Galeria -->
  <section class="galeria">
    <img src="imagens/cesta1.jpg" alt="Cesta gourmet" onclick="openLightbox('cesta1',0)">
    <img src="imagens/cesta2.jpg" alt="Cesta artesanal" onclick="openLightbox('cesta2',0)">
    <img src="imagens/cesta3.jpg" alt="Cesta premium" onclick="openLightbox('cesta3',0)">
    <img src="imagens/cesta4.jpg" alt="Cesta temática" onclick="openLightbox('cesta4',0)">
    <img src="imagens/cesta5.jpg" alt="Cesta de luxo" onclick="openLightbox('cesta5',0)">
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <span class="prev" onclick="changeImage(-1)">&#10094;</span>
    <div id="lightbox-content"></div>
    <span class="next" onclick="changeImage(1)">&#10095;</span>
  </div>

  <!-- Footer -->
  <footer>
    <p>📞 +244 924 015 087 | 📧 esandjoatelierdemimos@gmail.com</p>
    <p>
      <a href="https://www.instagram.com/esandjoatelierdemimos/" target="_blank">Instagram</a> | 
      <a href="https://www.facebook.com/esandjoatelierdemimos/" target="_blank">Facebook</a>
    </p>
    <p id="open-hours">Aberto todos os dias das 8h às 22h</p>
  </footer>

<script>
  const gallerySets = {
    cesta1: ["imagens/cesta1.jpg","imagens/cesta1a.jpg","imagens/cesta1b.mp4","imagens/cesta1c.jpg","imagens/cesta1d.jpg"],
    cesta2: ["imagens/cesta2.jpg","imagens/cesta2a.jpg","imagens/cesta2b.jpg","imagens/cesta2c.jpg","imagens/cesta2d.jpg"],
    cesta3: ["imagens/cesta3.jpg"],
    cesta4: ["imagens/cesta4.jpg"],
    cesta5: ["imagens/cesta5.jpg"]
  };

  let currentSet = [];
  let currentIndex = 0;

  function openLightbox(setName, index) {
    currentSet = gallerySets[setName];
    currentIndex = index;
    document.getElementById('lightbox').style.display = 'flex';
    showMedia();
  }

  function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
  }

  function changeImage(direction) {
    currentIndex += direction;
    if (currentIndex < 0) currentIndex = currentSet.length - 1;
    if (currentIndex >= currentSet.length) currentIndex = 0;
    showMedia();
  }

  function showMedia() {
    const container = document.getElementById('lightbox-content');
    const file = currentSet[currentIndex];
    const ext = file.split('.').pop().toLowerCase();

    if (ext === 'mp4') {
      container.innerHTML = `<video src="${file}" controls autoplay style="max-width:90%;max-height:80%;border-radius:12px;"></video>`;
    } else {
      container.innerHTML = `<img src="${file}" style="max-width:90%;max-height:80%;border-radius:12px;">`;
    }
  }

  // Navegação por teclado
  document.addEventListener('keydown', function(e) {
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowLeft") changeImage(-1);
    if (e.key === "ArrowRight") changeImage(1);
  });

  // Fechar ao clicar fora
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target.id === 'lightbox') closeLightbox();
  });

  // Traduções multilíngue
  const translations = {
    pt: { 
      contact: "Fale Conosco", 
      openHours: "Aberto todos os dias das 8h às 22h",
      navbar: { home:"Início", cestas:"Cestas & Mimos", pedidos:"Pedidos", catering:"Catering Infantil", contactos:"Contactos" }
    },
    en: { 
      contact: "Contact Us", 
      openHours: "Open daily from 8am to 10pm",
      navbar: { home:"Home", cestas:"Baskets & Gifts", pedidos:"Orders", catering:"Kids Catering", contactos:"Contacts" }
    },
    zh: { 
      contact: "联系我们", 
      openHours: "每天营业，早上8点到晚上10点",
      navbar: { home:"首页", cestas:"礼篮与礼品", pedidos:"订单", catering:"儿童餐饮", contactos:"联系方式" }
    }
  };

  function setLang(lang) {
    localStorage.setItem("siteLang", lang);
    applyLang(lang);
  }

  function applyLang(lang) {
    document.getElementById('cta-btn').textContent = translations[lang].contact;
    document.getElementById('open-hours').textContent = translations[lang].openHours;
    document.querySelectorAll('.nav-link').forEach(link => {
      const key = link.getAttribute("data-key");
      link.textContent = translations[lang].navbar[key];
    });
  }

  window.onload = function() {
    const lang = localStorage.getItem("siteLang") || "pt";
    applyLang(lang);
  };
</script>
</body>
</html>
